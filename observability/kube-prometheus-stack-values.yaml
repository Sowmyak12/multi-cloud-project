# Trimmed-down kube-prometheus-stack config for a portfolio demo cluster:
# short retention, no persistent volumes.
grafana:
  enabled: true
  adminPassword: "" # set via --set on install if you want a fixed password; otherwise auto-generated
  service:
    # LoadBalancer (not ClusterIP) so it's reachable directly without going
    # through Cloud Shell's Web Preview proxy, which Grafana's CSRF/Origin
    # check rejects. Switch back to ClusterIP (~$18/mo LB cost) once you're
    # done viewing/screenshotting the dashboard.
    type: LoadBalancer
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

prometheus:
  prometheusSpec:
    retention: 6h
    # Portfolio demo has one ServiceMonitor (taskflow-api) living in its own
    # namespace, not the release namespace, so open up selection to all of them.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec: {} # emptyDir-backed; this is a disposable demo cluster, not prod

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi

# Scrape the taskflow-api pods via their prometheus.io/* annotations.
prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi

# GKE Autopilot manages kube-system and blocks any user write to it, so the
# chart's default control-plane scrape targets (which need to create
# Services/Endpoints there) can never work here regardless of RBAC — disable
# them rather than leave them permanently failing.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
coreDns:
  enabled: false
prometheusOperator:
  kubeletService:
    enabled: false
