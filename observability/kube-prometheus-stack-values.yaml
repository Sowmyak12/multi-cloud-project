# Trimmed-down kube-prometheus-stack config for a portfolio demo cluster:
# short retention, no persistent volumes.
grafana:
  enabled: true
  adminPassword: "" # set via --set on install if you want a fixed password; otherwise auto-generated
  service:
    # ClusterIP: no ongoing LoadBalancer cost. Access via
    # `kubectl port-forward svc/kube-prometheus-stack-grafana -n observability 3000:80`.
    # Note: viewing it through Cloud Shell's Web Preview will hit the same
    # CSRF "origin not allowed" 403 seen before, since Grafana's Origin check
    # rejects Cloud Shell's proxy domain — temporarily switch back to
    # LoadBalancer if you need to view it live again.
    type: ClusterIP
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

prometheus:
  prometheusSpec:
    retention: 6h
    # Portfolio demo has one ServiceMonitor (taskflow-api) living in its own
    # namespace, not the release namespace, so open up selection to all of them.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec: {} # emptyDir-backed; this is a disposable demo cluster, not prod

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi

# Scrape the taskflow-api pods via their prometheus.io/* annotations.
prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi

# GKE Autopilot manages kube-system and blocks any user write to it, so the
# chart's default control-plane scrape targets (which need to create
# Services/Endpoints there) can never work here regardless of RBAC — disable
# them rather than leave them permanently failing.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
coreDns:
  enabled: false
prometheusOperator:
  kubeletService:
    enabled: false
