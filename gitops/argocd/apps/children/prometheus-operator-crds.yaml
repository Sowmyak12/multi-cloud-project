# ArgoCD renders Helm charts via `helm template`, which does not reliably
# install a chart's bundled crds/ directory, so kube-prometheus-stack's CRDs
# (Prometheus, ServiceMonitor, ...) need to be installed as their own step,
# before the actual stack.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-operator-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-operator-crds
    targetRevision: 30.0.1
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # these CRDs are too large for client-side apply's annotation limit
