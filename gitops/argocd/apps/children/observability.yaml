apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # install before taskflow-api so the ServiceMonitor CRD exists
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 65.5.1
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/observability/kube-prometheus-stack-values.yaml
    - repoURL: https://github.com/Sowmyak12/multi-cloud-project.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Sowmyak12/multi-cloud-project.git
      targetRevision: main
      path: observability/dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # this chart also bundles the Prometheus Operator CRDs, too large for client-side apply
