# Dev-mode Vault for a portfolio demo: unsealed automatically, root token fixed,
# no persistent storage. NOT a production configuration — real deployments use
# auto-unseal + a real storage backend + short-lived tokens.
server:
  dev:
    enabled: true
    devRootToken: "root-demo-token"
  ha:
    enabled: false
  standalone:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  service:
    type: ClusterIP

injector:
  enabled: true
  # Single replica in this demo, so the chart's default anti-affinity rule
  # (spreading replicas across nodes) is pointless here — and GKE Autopilot
  # requires >=500m CPU on any pod using anti-affinity, which we don't want
  # to pay for. Disable it instead of bumping resources just to satisfy that.
  affinity: ""
  resources:
    requests:
      cpu: 25m
      memory: 64Mi

ui:
  enabled: true
  serviceType: ClusterIP
